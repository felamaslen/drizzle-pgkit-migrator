name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: dpkmtest
          POSTGRES_PASSWORD: dpkmtest
          POSTGRES_DB: dpkmtest
        ports:
          - 5455:5432
        options: >-
          --health-cmd "pg_isready -U dpkmtest -d dpkmtest"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgres://dpkmtest:dpkmtest@localhost:5455/dpkmtest
